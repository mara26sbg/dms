<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العهد الإلكترونية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root {
            --primary: #2563eb;
            --success: #16a34a;
            --whatsapp: #25D366;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #cbd5e1;
            --white: #ffffff;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 15px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: var(--white); border-radius: var(--radius); shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        
        header { background: var(--primary); color: var(--white); padding: 25px; text-align: center; }
        header h2 { font-size: 1.8rem; letter-spacing: 1px; }

        .tabs { display: flex; background: #f1f5f9; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px 10px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: 600; color: #64748b; transition: 0.3s; min-width: 100px; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--white); }

        .tab-content { display: none; padding: 25px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: var(--success); color: white; }
        
        .notification-box { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .btn-wa { background: var(--whatsapp); color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; margin: 5px; }

        .card { background: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .card h4 { color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .badge { position: absolute; left: 15px; top: 15px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-active { background: #fef08a; color: #854d0e; }
        .badge-done { background: #dcfce7; color: #166534; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>نظام العهد الإلكترونية</h2>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('borrow')"><i class="fas fa-plus"></i> استعارة</button>
        <button class="tab-btn" onclick="switchTab('active-view')"><i class="fas fa-desktop"></i> العمليات النشطة</button>
        <button class="tab-btn" onclick="switchTab('return-view')"><i class="fas fa-undo"></i> إرجاع</button>
        <button class="tab-btn" onclick="switchTab('history')"><i class="fas fa-history"></i> السجل</button>
    </div>

    <div id="borrow" class="tab-content active">
        <form id="borrowForm">
            <div class="form-group">
                <label>اسم المستلم:</label>
                <input type="text" id="recName" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <label>رقم هاتف المستلم:</label>
                <input type="tel" id="recPhone" placeholder="مثال: 9xxxxxxx" required>
            </div>
            <div class="form-group">
                <label>اسم المُسلم:</label>
                <input type="text" id="givName" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <label>رقم هاتف المُسلم:</label>
                <input type="tel" id="givPhone" placeholder="مثال: 9xxxxxxx" required>
            </div>
            <div class="form-group">
                <label>نوع الجهاز:</label>
                <select id="deviceName" required>
                    <option value="">اختر الجهاز...</option>
                    <option value="TAB">TAB </option>
                    <option value="TAB">TAB </option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> حفظ </button>
        </form>

        <div id="borrowWaBox" class="notification-box">
            <p style="color: var(--success); font-weight: bold; margin-bottom: 10px;">تم حفظ البيانات بنجاح!</p>
            <a href="#" id="waRecBtn" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> مراسلة المستلم</a>
            <a href="#" id="waGivBtn" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> مراسلة المُسلم</a>
        </div>
    </div>

    <div id="active-view" class="tab-content">
        <div id="activeList"></div>
    </div>

    <div id="return-view" class="tab-content">
        <div class="form-group">
            <input type="text" id="searchReturn" placeholder="ابحث برقم هاتف المستلم للإرجاع..." onkeyup="filterReturn()">
        </div>
        <div id="returnList"></div>
    </div>

    <div id="history" class="tab-content">
        <div id="historyList"></div>
    </div>
</div>

<script type="module">
    // استيراد Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // إعدادات Firebase (استبدلها ببياناتك الخاصة)
    const firebaseConfig = {
        apiKey: "AIzaSyBg4l5LFpt5piDbpfH3-XfV470vrEY_LIQ",
        authDomain: "device-management-e4049.firebaseapp.com",
        projectId: "device-management-e4049",
        storageBucket: "device-management-e4049.firebasestorage.app",
        messagingSenderId: "93864301196",
        appId: "1:93864301196:web:7a346a0f44ea17ab4121a9",
        measurementId: "G-VL6WEGTHVK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة التبديل بين التبويبات
    window.switchTab = (id) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        const currentBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(id));
        if(currentBtn) currentBtn.classList.add('active');
        
        document.getElementById(id).classList.add('active');
        
        if(id === 'active-view') fetchActive();
        if(id === 'return-view') fetchForReturn();
        if(id === 'history') fetchHistory();
    };

    // حفظ عملية استعارة
    document.getElementById('borrowForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

        const data = {
            recName: document.getElementById('recName').value,
            recPhone: document.getElementById('recPhone').value,
            givName: document.getElementById('givName').value,
            givPhone: document.getElementById('givPhone').value,
            device: document.getElementById('deviceName').value,
            borrowDate: new Date().toLocaleDateString('en-GB'),
            timestamp: Date.now(),
            status: 'active'
        };

        try {
            await addDoc(collection(db, "orders"), data);
            
            // تجهيز روابط الواتساب
            const msg = `تأكيد استعارة: تم تسجيل جهاز (${data.device}) بعهدة ${data.recName} بتاريخ ${data.borrowDate}.`;
            document.getElementById('waRecBtn').href = `https://wa.me/968${data.recPhone}?text=${encodeURIComponent(msg)}`;
            document.getElementById('waGivBtn').href = `https://wa.me/968${data.givPhone}?text=${encodeURIComponent(msg)}`;
            
            document.getElementById('borrowWaBox').style.display = 'block';
            document.getElementById('borrowForm').reset();
            alert("تم الحفظ بنجاح");
        } catch (err) {
            console.error(err);
            alert("خطأ في الاتصال بقاعدة البيانات");
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> حفظ';
    });

    // جلب البيانات النشطة
    async function fetchActive() {
        const container = document.getElementById('activeList');
        container.innerHTML = 'جاري التحميل...';
        const q = query(collection(db, "orders"), where("status", "==", "active"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = snap.empty ? '<p style="text-align:center">لا توجد عمليات نشطة حالياً</p>' : '';
        
        snap.forEach(d => {
            const r = d.data();
            container.innerHTML += `
                <div class="card">
                    <span class="badge badge-active">قيد الاستعارة</span>
                    <h4>${r.device}</h4>
                    <p><strong>المستلم:</strong> ${r.recName}</p>
                    <p><strong>المُسلم:</strong> ${r.givName}</p>
                    <p><strong>التاريخ:</strong> ${r.borrowDate}</p>
                </div>
            `;
        });
    }

    // جلب البيانات للإرجاع
    window.fetchForReturn = async () => {
        const container = document.getElementById('returnList');
        container.innerHTML = 'جاري التحميل...';
        const q = query(collection(db, "orders"), where("status", "==", "active"));
        const snap = await getDocs(q);
        container.innerHTML = '';
        
        snap.forEach(d => {
            const r = d.data();
            const card = document.createElement('div');
            card.className = 'card return-item';
            card.dataset.phone = r.recPhone;
            card.innerHTML = `
                <h4>${r.device}</h4>
                <p><strong>المستلم:</strong> ${r.recName} (${r.recPhone})</p>
                <button class="btn btn-success" style="margin-top:10px" onclick="confirmReturn('${d.id}', '${r.recPhone}', '${r.device}')">تأكيد الإرجاع</button>
            `;
            container.appendChild(card);
        });
    };

    // عملية الإرجاع
    window.confirmReturn = async (id, phone, device) => {
        if(!confirm("هل تم استلام الجهاز فعلاً؟")) return;
        
        const docRef = doc(db, "orders", id);
        await updateDoc(docRef, { 
            status: 'done',
            returnDate: new Date().toLocaleDateString('en-GB')
        });
        
        alert("تم الإرجاع بنجاح");
        const msg = `تم استلام الجهاز (${device}) بنجاح وإغلاق العهدة. شكراً لكم.`;
        window.open(`https://wa.me/968${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        fetchForReturn();
    };

    // جلب السجل
    async function fetchHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = 'جاري التحميل...';
        const q = query(collection(db, "orders"), where("status", "==", "done"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = snap.empty ? '<p style="text-align:center">السجل فارغ</p>' : '';
        
        snap.forEach(d => {
            const r = d.data();
            container.innerHTML += `
                <div class="card">
                    <span class="badge badge-done">مكتملة</span>
                    <h4>${r.device}</h4>
                    <p><strong>المستلم:</strong> ${r.recName}</p>
                    <p><strong>تاريخ الاستعارة:</strong> ${r.borrowDate}</p>
                    <p><strong>تاريخ الإرجاع:</strong> ${r.returnDate}</p>
                </div>
            `;
        });
    }

    // فلترة البحث في صفحة الإرجاع
    window.filterReturn = () => {
        const val = document.getElementById('searchReturn').value.toLowerCase();
        document.querySelectorAll('.return-item').forEach(item => {
            item.style.display = item.dataset.phone.includes(val) ? 'block' : 'none';
        });
    };
</script>
</body>
</html>
